<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="robots" content="noindex,nofollow">
    <title>仙人Tube Pro</title>
    <link rel="icon" href="/img/logo/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
    /* --- 基本設定 --- */
    :root {
        --primary-color: #007bff;
        --primary-hover: #0056b3;
        --bg-light: #f8f9fa;
        --text-dark: #212529;
        --gray-logo: #495057;
        --glass-bg: rgba(255, 255, 255, 0.75);
        --card-bg: #ffffff;
        --border-color: rgba(0, 0, 0, 0.06);
    }

    html,
    body {
        font-family: 'Noto Sans JP', BlinkMacSystemFont, -apple-system, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        padding: 0;
        background-color: var(--bg-light);
        color: var(--text-dark);
        overflow-x: hidden;
        /* スワイプ操作によるブラウザの戻る/進むを抑制 */
        touch-action: pan-y;
    }

    /* --- 改良版トップバー --- */
    #top-bar {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        background-color: var(--glass-bg);
        backdrop-filter: blur(20px) saturate(180%);
        -webkit-backdrop-filter: blur(20px) saturate(180%);
        z-index: 1000;
        padding: 18px 40px;
        display: flex;
        align-items: center;
        justify-content: flex-end; /* 右寄せに整列 */
        box-shadow: none;
        border-bottom: 1px solid var(--border-color);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-sizing: border-box;
    }

    #top-bar.scrolled {
        padding: 12px 40px;
        background-color: rgba(255, 255, 255, 0.9);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.03);
    }

    #top-nav {
        display: flex;
        align-items: center;
        gap: 16px;
    }

    /* ボタンデザインのモダン化 */
    #top-nav a {
        position: relative;
        color: var(--text-dark);
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        padding: 8px 20px;
        border-radius: 50px;
        transition: all 0.2s ease;
        background: rgba(0, 0, 0, 0.04);
        cursor: pointer;
        display: flex;
        align-items: center;
        border: 1px solid transparent;
    }

    #top-nav a i {
        font-size: 14px;
        margin-right: 8px;
        opacity: 0.9;
    }

    #top-nav a:hover {
        color: #fff;
        background: var(--primary-color);
        box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
        transform: translateY(-1px);
    }

    /* パネル関連のスタイル */
    #settings-panel, #menu-panel {
        position: fixed;
        top: 0;
        right: -320px;
        width: 320px;
        height: 100%;
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(25px) saturate(190%);
        -webkit-backdrop-filter: blur(25px) saturate(190%);
        z-index: 2001;
        box-shadow: -10px 0 40px rgba(0,0,0,0.05);
        transition: right 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        padding: 40px 30px;
        box-sizing: border-box;
        border-left: 1px solid rgba(0, 0, 0, 0.05);
    }

    #settings-panel.open, #menu-panel.open {
        right: 0;
    }

    .settings-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 35px;
        border-bottom: 1px solid rgba(0,0,0,0.08);
        padding-bottom: 15px;
    }

    .settings-header h2 {
        font-weight: 700;
        letter-spacing: -0.5px;
    }

    .settings-option {
        margin-bottom: 25px;
    }

    .settings-option p {
        font-weight: 500;
        color: var(--text-dark);
    }

    .settings-option small {
        color: #6c757d;
        font-size: 13px;
    }

    .menu-list {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .menu-list li {
        margin-bottom: 10px;
    }

    .menu-list a {
        display: flex;
        align-items: center;
        padding: 14px 20px;
        color: var(--text-dark);
        text-decoration: none;
        border-radius: 14px;
        transition: all 0.25s ease;
        font-weight: 500;
        background: rgba(0, 0, 0, 0.02);
        font-size: 15px;
    }

    .menu-list a:hover {
        background: var(--primary-color);
        color: #fff;
        transform: scale(1.02);
        box-shadow: 0 4px 15px rgba(0, 123, 255, 0.25);
    }

    .menu-list i {
        width: 34px;
        height: 34px;
        margin-right: 14px;
        font-size: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.05);
        transition: all 0.25s ease;
    }

    .menu-list a:hover i {
        background: rgba(255, 255, 255, 0.2);
        color: #fff;
    }

    /* --- 検索ウィジェット中央配置 --- */
    #contents {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        box-sizing: border-box;
        padding-top: 60px;
    }

    #search-widget {
        width: 100%;
        max-width: 720px;
        text-align: center;
        padding: 0 24px;
        animation: fadeInUp 0.8s cubic-bezier(0.165, 0.84, 0.44, 1);
    }

    @keyframes fadeInUp {
        0% { opacity: 0; transform: translateY(40px); }
        100% { opacity: 1; transform: translateY(0); }
    }

    #logo > h1 {
        font-size: clamp(2.8em, 7vw, 4.2em);
        font-weight: 700;
        margin-bottom: 35px;
        color: var(--gray-logo);
        cursor: pointer;
        transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
        letter-spacing: -1.5px;
        user-select: none;
    }

    #logo > h1:hover {
        transform: scale(1.02);
        color: #111;
    }

    #logo sup {
        font-size: 0.45em;
        color: var(--primary-color);
        margin-left: 6px;
        font-weight: 500;
    }

    /* --- 検索バーの強化 --- */
    .searchbar {
        position: relative;
        width: 100%;
        display: flex;
        justify-content: center;
        margin-bottom: 30px;
    }

    .search-container {
        position: relative;
        width: 100%;
    }

    .searchbar input[type="search"] {
        width: 100%;
        padding: 20px 30px 20px 60px;
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 50px;
        outline: none;
        font-size: 17px;
        background-color: var(--card-bg);
        box-shadow: 0 10px 35px rgba(0, 0, 0, 0.05);
        transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
        box-sizing: border-box;
    }

    .searchbar i.fa-search {
        position: absolute;
        left: 24px;
        top: 50%;
        transform: translateY(-50%);
        color: #adb5bd;
        font-size: 18px;
        transition: color 0.3s ease;
        pointer-events: none;
    }

    .searchbar input[type="search"]:focus {
        border-color: rgba(0, 123, 255, 0.5);
        box-shadow: 0 15px 40px rgba(0, 123, 255, 0.12);
        transform: translateY(-1px);
    }

    .searchbar input[type="search"]:focus + i.fa-search {
        color: var(--primary-color);
    }

    /* --- 最新情報通知 --- */
    .latest-info {
        position: fixed;
        top: 95px;
        right: 24px;
        width: 320px;
        background: #fff;
        border-radius: 16px;
        padding: 18px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
        z-index: 2000;
        border-left: 4px solid var(--primary-color);
        animation: slideInDownRight 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        box-sizing: border-box;
        transition: transform 0.2s ease, opacity 0.2s ease;
        cursor: grab;
        user-select: none;
    }

    .latest-info:active {
        cursor: grabbing;
    }

    @keyframes slideInDownRight {
        0% { opacity: 0; transform: translate(40px, -10px); }
        100% { opacity: 1; transform: translate(0, 0); }
    }

    .latest-info-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
    }

    .latest-info h3 {
        margin: 0;
        font-size: 12px;
        text-transform: uppercase;
        color: var(--primary-color);
        letter-spacing: 1.5px;
        font-weight: 700;
    }

    .close-info {
        background: none;
        border: none;
        color: #adb5bd;
        cursor: pointer;
        font-size: 15px;
        transition: color 0.2s;
        padding: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .close-info:hover {
        color: var(--text-dark);
    }

    #infoContent {
        font-size: 14px;
        line-height: 1.6;
        color: #495057;
        min-height: 44px;
        display: flex;
        align-items: center;
        transition: opacity 0.5s;
        font-weight: 500;
    }

    /* --- ダークモード対応 --- */
    @media (prefers-color-scheme: dark) {
        :root {
            --bg-light: #0f0f0f;
            --text-dark: #f8f9fa;
            --glass-bg: rgba(15, 15, 15, 0.75);
            --gray-logo: #e9ecef;
            --card-bg: #1f1f1f;
            --border-color: rgba(255, 255, 255, 0.08);
        }
        #top-bar.scrolled {
            background-color: rgba(15, 15, 15, 0.95);
        }
        #top-nav a {
            color: var(--text-dark);
            background: rgba(255, 255, 255, 0.06);
        }
        #top-nav a:hover {
            background: var(--primary-color);
            color: #fff;
        }
        .searchbar input[type="search"] {
            border-color: transparent;
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.3);
        }
        .searchbar input[type="search"]:focus {
            border-color: rgba(0, 123, 255, 0.6);
            box-shadow: 0 15px 40px rgba(0, 123, 255, 0.2);
        }
        .latest-info {
            background: #1f1f1f;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.4);
        }
        #infoContent { color: #ced4da; }
        #settings-panel, #menu-panel { 
            background: rgba(30, 30, 30, 0.85);
            border-left: 1px solid rgba(255,255,255,0.05); 
        }
        .settings-header { border-bottom-color: rgba(255,255,255,0.1); }
        .menu-list a { background: rgba(255, 255, 255, 0.04); }
        .menu-list i { background: rgba(255, 255, 255, 0.06); }
        #logo > h1:hover { color: #fff; }
    }

    /* --- モバイル対応 --- */
    #hamburger {
        display: none;
        font-size: 22px;
        cursor: pointer;
        padding: 6px;
    }

    @media (max-width: 768px) {
        #top-bar {
            padding: 15px 24px;
        }
        #top-bar.scrolled {
            padding: 12px 24px;
        }
        #hamburger { display: block; }
        #top-nav {
            position: fixed;
            top: 76px;
            right: 24px;
            background-color: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            flex-direction: column;
            width: 180px;
            border-radius: 18px;
            padding: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.12);
            border: 1px solid var(--border-color);
            transform: scale(0.95) translateY(-15px);
            opacity: 0;
            pointer-events: none;
            transition: all 0.25s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        #top-nav.show {
            transform: scale(1) translateY(0);
            opacity: 1;
            pointer-events: auto;
        }
        #top-nav a {
            margin: 4px 0;
            width: 100%;
            box-sizing: border-box;
            justify-content: center;
        }
        .latest-info {
            width: calc(100% - 48px);
            right: 24px;
            top: 85px;
        }
    }
</style>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>
<link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css" />

<script>
    $(document).ready(function () {
        // ハンバーガーメニュー
        $("#hamburger").click(function (e) {
            e.stopPropagation();
            $("#top-nav").toggleClass("show");
        });

        $(document).click(function(){
            $("#top-nav").removeClass("show");
        });

        // Status通知を閉じる機能
        function closeStatusInfo() {
            $("#latestInfo").fadeOut(300, function() {
                // 7秒後に再表示
                setTimeout(function() {
                    $("#latestInfo").css({
                        "transform": "translateX(0)",
                        "opacity": "1"
                    }).fadeIn(300);
                }, 7000);
            });
        }

        $(".close-info").click(function(){
            closeStatusInfo();
        });

        // スクロール時のヘッダー変化
        $(window).on("scroll", function () {
            if ($(window).scrollTop() > 30) {
                $("#top-bar").addClass("scrolled");
            } else {
                $("#top-bar").removeClass("scrolled");
            }
        });

        // オートコンプリートの強化
        $('#searchbox').autocomplete({
            source: function (request, response) {
                var url = "/suggest?keyword=" + encodeURIComponent(request.term);
                $.getJSON(url, function(data) {
                    response(data);
                });
            },
            delay: 0,
            minLength: 1
        });

        // 設定パネルの開閉
        $("#open-settings").click(function(e){
            e.preventDefault();
            $("#menu-panel").removeClass("open");
            $("#settings-panel").addClass("open");
        });

        $("#close-settings").click(function(){
            $("#settings-panel").removeClass("open");
        });

        // メニューパネルの開閉
        $("#open-menu").click(function(e){
            e.preventDefault();
            $("#settings-panel").removeClass("open");
            $("#menu-panel").addClass("open");
        });

        $("#close-menu").click(function(){
            $("#menu-panel").removeClass("open");
        });

        // パネル外クリックで閉じる
        $(document).mouseup(function(e) {
            var settings = $("#settings-panel");
            var menu = $("#menu-panel");
            if (!settings.is(e.target) && settings.has(e.target).length === 0) {
                settings.removeClass("open");
            }
            if (!menu.is(e.target) && menu.has(e.target).length === 0) {
                menu.removeClass("open");
            }
        });

        // --- スワイプ操作ロジック ---
        let startX = 0;
        let startY = 0;
        let infoStartX = 0;
        let isSwipingInfo = false;

        document.addEventListener('touchstart', function(e) {
            startX = e.touches[0].pageX;
            startY = e.touches[0].pageY;
            
            // Status通知のスワイプ開始判定
            if ($(e.target).closest('#latestInfo').length > 0) {
                isSwipingInfo = true;
                infoStartX = e.touches[0].pageX;
            }
        }, { passive: true });

        document.addEventListener('touchmove', function(e) {
            if (isSwipingInfo) {
                let moveX = e.touches[0].pageX - infoStartX;
                if (moveX > 0) { // 右方向へのスワイプのみ可視化
                    $("#latestInfo").css({
                        "transform": `translateX(${moveX}px)`,
                        "opacity": 1 - (moveX / 200)
                    });
                }
            }
        }, { passive: true });

        document.addEventListener('touchend', function(e) {
            let endX = e.changedTouches[0].pageX;
            let endY = e.changedTouches[0].pageY;
            let diffX = startX - endX;
            let diffY = Math.abs(startY - endY);

            // 1. どこでも左にスワイプでメニュー表示 (右から左へのスワイプ)
            if (diffX > 50 && diffY < 100) {
                $("#menu-panel").addClass("open");
            }

            // 2. Status通知のスワイプ消去判定
            if (isSwipingInfo) {
                let moveX = endX - infoStartX;
                if (moveX > 100) { // 100px以上右にスワイプしたら消去
                    closeStatusInfo();
                } else {
                    // 戻す
                    $("#latestInfo").css({
                        "transform": "translateX(0)",
                        "opacity": "1"
                    });
                }
                isSwipingInfo = false;
            }
        }, { passive: true });
    });
</script>

</head>
<body class="no-theme">

<header id="top-bar">
    <div id="hamburger"><i class="fas fa-bars"></i></div>
    <nav id="top-nav">
        <a id="open-menu"><i class="fas fa-th-large"></i>メニュー</a>
        <a id="open-settings"><i class="fas fa-cog"></i>設定</a>
    </nav>
</header>

<div id="menu-panel">
    <div class="settings-header">
        <h2 style="margin:0; font-size:18px;"><i class="fas fa-layer-group"></i> メニュー</h2>
        <button id="close-menu" class="close-info"><i class="fas fa-times"></i></button>
    </div>
    <div class="settings-content">
        <ul class="menu-list">
            <li><a href="/games"><i class="fas fa-rocket"></i> ゲーム</a></li>
            <li><a href="/subscriptions"><i class="fas fa-heart"></i> 登録済みチャンネル</a></li>
            <li><a href="/history"><i class="fas fa-compass"></i> 履歴</a></li>
            <li><a href="/tools"><i class="fas fa-wand-magic-sparkles"></i> tools</a></li>
            <li><a href="/status"><i class="fas fa-chart-line"></i> 稼働状況</a></li>
            <li><a href="/bbs"><i class="far fa-comments"></i> 掲示板</a></li>
        </ul>
    </div>
</div>

<div id="settings-panel">
    <div class="settings-header">
        <h2 style="margin:0; font-size:18px;"><i class="fas fa-cog"></i> 設定オプション</h2>
        <button id="close-settings" class="close-info"><i class="fas fa-times"></i></button>
    </div>
    <div class="settings-content">
        <div class="settings-option">
            <p style="font-size:14px; margin-bottom:10px;">外観モード</p>
            <small>システム設定に従います</small>
        </div>
        <div class="settings-option">
            <p style="font-size:14px; margin-bottom:10px;">通知設定</p>
            <small>ステータス情報の表示/非表示</small>
        </div>
        <div class="settings-option" style="margin-top:40px;">
            <p style="font-size:12px; opacity:0.6;">Version 1.4.0</p>
        </div>
    </div>
</div>

<div class="latest-info" id="latestInfo">
    <div class="latest-info-header">
        <h3><i class="fas fa-bell"></i> <span class="status-glow">Status</span></h3>
        <button class="close-info" title="閉じる"><i class="fas fa-times"></i></button>
    </div>
    <div id="infoContent">仙人Tubeへようこそ</div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const infoContent = document.getElementById("infoContent");
        const messages = [
            "仙人tubeを一から改良しました",
            "エラーの時は時間をおこう",
            "再生できないときはリロードしてね"
        ];
        let i = 0;
        setInterval(() => {
            if(document.getElementById("latestInfo").style.display !== 'none') {
                infoContent.style.opacity = 0;
                setTimeout(() => {
                    infoContent.textContent = messages[i];
                    infoContent.style.opacity = 1;
                    i = (i + 1) % messages.length;
                }, 500);
            }
        }, 6000);
    });
</script>

<div id="contents">
    <div id="search-widget">
        <div id="logo">
            <h1 onclick="location.replace('/')">仙人Tube <span class="brand-pro">Pro</span></h1>
            <p style="font-size: 0.9rem; color: var(--primary-color); margin: -25px 0 30px; font-weight: 600; letter-spacing: 1px;">Ver 1.4.0</p>
        </div>
        <div class="searchbar">
            <form action="/search" method="get" class="search-container">
                <input id="searchbox" name="q" type="search" placeholder="動画を検索..."
                       autocomplete="off" spellcheck="false" autofocus>
                <i class="fas fa-search"></i>
            </form>
        </div>
    </div>
    <div style="position: fixed; bottom: 12px; left: 0; width: 100%; text-align: center; font-size: 0.75rem; color: var(--gray-logo); opacity: 0.7; pointer-events: none; z-index: 5;">
        改造版-仙人Tube by 2a_exe
    </div>
</div>
