<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン | 仙人Tube Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --sky:#7dd3fc;
    --sky-strong:#38bdf8;
    --sky-deep:#0ea5e9;
    --black:#0a0a0a;
    --muted:#6b7280;
    --border:#e5e7eb;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;font-family:'Noto Sans JP',sans-serif;color:var(--black);background:#fff;}
  .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .card{width:100%;max-width:380px;}
  .logo{width:48px;height:48px;border-radius:50%;background:var(--sky);margin:0 auto 20px;}
  h1{font-size:1.5rem;font-weight:700;text-align:center;margin:0 0 6px;color:var(--black);}
  .sub{text-align:center;color:var(--muted);font-size:.9rem;margin:0 0 28px;}
  label{display:block;font-size:.85rem;font-weight:500;margin:0 0 6px;color:var(--black);}
  .field{margin-bottom:16px;}
  input[type=password],input[type=text]{
    width:100%;padding:11px 14px;font-size:.95rem;
    border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--black);
    outline:none;transition:.15s;font-family:inherit;
  }
  input:focus{border-color:var(--sky-strong);box-shadow:0 0 0 3px rgba(125,211,252,.3);}
  input::placeholder{color:#9ca3af;}
  .row{display:flex;justify-content:space-between;align-items:center;margin:6px 0 20px;font-size:.85rem;}
  .remember{display:flex;align-items:center;gap:6px;color:var(--muted);cursor:pointer;}
  .remember input{accent-color:var(--sky-strong);}
  .forgot{color:var(--sky-deep);text-decoration:none;}
  .forgot:hover{text-decoration:underline;}
  .btn{
    width:100%;padding:12px;border:none;border-radius:8px;
    background:var(--sky-strong);color:#fff;font-weight:700;font-size:.95rem;
    cursor:pointer;transition:.15s;font-family:inherit;
  }
  .btn:hover{background:var(--sky-deep);}
  .btn:active{transform:translateY(1px);}
  .btn:disabled{opacity:.6;cursor:wait;}
  .err{margin-top:14px;text-align:center;color:#dc2626;font-size:.85rem;min-height:1.1em;}
  .meta{text-align:center;margin-top:24px;font-size:.75rem;color:var(--muted);}
</style>
</head>
<body>
<div class="wrap">
  <form class="card" method="POST" action="/login" id="loginForm" autocomplete="off">
    <div class="logo"></div>
    <h1>仙人Tube Pro</h1>
    <p class="sub">サインインして続行</p>

    <div class="field">
      <label for="pw">パスワード</label>
      <input type="password" id="pw" name="password" placeholder="••••••••" required autofocus>
    </div>

    <div class="row">
      <label class="remember"><input type="checkbox" name="remember" checked> ログイン状態を保持</label>
      <a class="forgot" href="#" onclick="alert('管理者にお問い合わせください'); return false;">忘れた？</a>
    </div>

    <button type="submit" class="btn" id="submitBtn">ログイン</button>

    <div class="err" id="err">{% if error %}{{ error }}{% endif %}</div>
    <div class="meta">v1.4.0 · 仙人Tube Pro</div>
  </form>
</div>
<script>
  document.getElementById('loginForm').addEventListener('submit',()=>{
    const b=document.getElementById('submitBtn');
    b.disabled=true; b.textContent='認証中...';
  });
</script>
</body>
</html>
