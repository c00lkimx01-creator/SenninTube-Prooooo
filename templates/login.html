<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン | 仙人Tube Pro v1.5.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DotGothic16&display=swap" rel="stylesheet">
<style>
  :root{
    --star:#dbeafe;--neon:#7dd3fc;--neon-strong:#38bdf8;--neon-deep:#0ea5e9;
    --pink:#f472b6;--purple:#a78bfa;--ink:#e0e7ff;--muted:#94a3b8;
    --border:rgba(148,163,184,.25);--panel:rgba(10,12,30,.55);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;color:var(--ink);
    font-family:'DotGothic16','Press Start 2P',monospace;
    background:#02030a;overflow:hidden;}
  .space,.stars,.stars2,.stars3,.milky,.nebula{position:fixed;inset:0;pointer-events:none;}
  .space{background:
      radial-gradient(ellipse at 20% 30%, rgba(59,130,246,.25), transparent 60%),
      radial-gradient(ellipse at 80% 70%, rgba(168,85,247,.25), transparent 60%),
      radial-gradient(ellipse at 50% 100%, rgba(236,72,153,.18), transparent 55%),
      linear-gradient(180deg,#02030a 0%,#050820 60%,#02030a 100%);z-index:-5;}
  .milky{background:radial-gradient(1200px 260px at 50% 45%,
        rgba(255,255,255,.18) 0%,rgba(191,219,254,.14) 25%,
        rgba(196,181,253,.10) 50%,rgba(244,114,182,.06) 70%,transparent 80%);
    transform:rotate(-18deg) scale(1.4);filter:blur(6px);
    animation:drift 40s ease-in-out infinite alternate;z-index:-4;}
  .nebula{background:
      radial-gradient(400px 300px at 25% 25%, rgba(236,72,153,.25), transparent 70%),
      radial-gradient(500px 300px at 75% 60%, rgba(56,189,248,.20), transparent 70%);
    mix-blend-mode:screen;filter:blur(20px);
    animation:drift 60s ease-in-out infinite alternate-reverse;z-index:-3;}
  @keyframes drift{0%{transform:rotate(-18deg) scale(1.4) translate(0,0);}100%{transform:rotate(-14deg) scale(1.5) translate(20px,-20px);}}
  .stars,.stars2,.stars3{z-index:-2;}
  .stars::after,.stars2::after,.stars3::after{content:"";position:absolute;inset:0;background-repeat:repeat;}
  .stars::after{background-image:
      radial-gradient(1px 1px at 10% 20%, #fff, transparent),
      radial-gradient(1px 1px at 30% 80%, #fff, transparent),
      radial-gradient(1px 1px at 55% 15%, #cbd5f5, transparent),
      radial-gradient(1px 1px at 70% 55%, #fff, transparent),
      radial-gradient(1px 1px at 85% 25%, #fef9c3, transparent),
      radial-gradient(1px 1px at 40% 65%, #fff, transparent),
      radial-gradient(1px 1px at 92% 88%, #fff, transparent),
      radial-gradient(1px 1px at 15% 92%, #fff, transparent);
    animation:tw 4s ease-in-out infinite alternate;}
  .stars2::after{background-image:
      radial-gradient(1.5px 1.5px at 20% 40%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 65% 25%, #bae6fd, transparent),
      radial-gradient(1.5px 1.5px at 80% 70%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 35% 85%, #ddd6fe, transparent);
    animation:tw 6s ease-in-out infinite alternate-reverse;}
  .stars3::after{background-image:
      radial-gradient(2px 2px at 50% 50%, #fff, transparent),
      radial-gradient(2px 2px at 12% 70%, #f5d0fe, transparent),
      radial-gradient(2px 2px at 88% 10%, #a5f3fc, transparent);
    animation:tw 8s ease-in-out infinite alternate;}
  @keyframes tw{0%{opacity:.5}100%{opacity:1}}
  .shoot{position:fixed;top:20%;left:-10%;width:180px;height:2px;
    background:linear-gradient(90deg,transparent,#fff,transparent);
    transform:rotate(15deg);opacity:0;animation:shoot 7s linear infinite;z-index:-1;}
  .shoot.b{top:60%;animation-delay:3.5s;animation-duration:9s;}
  @keyframes shoot{0%{transform:translate(0,0) rotate(15deg);opacity:0;}5%{opacity:1;}40%{opacity:1;}60%{transform:translate(120vw,40vh) rotate(15deg);opacity:0;}100%{opacity:0;}}
  .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;z-index:1;}
  .card{width:100%;max-width:400px;padding:32px 28px;background:var(--panel);
    border:1px solid var(--border);border-radius:14px;
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    box-shadow:0 0 0 1px rgba(125,211,252,.15),0 20px 60px rgba(2,6,23,.6),inset 0 0 40px rgba(56,189,248,.05);
    animation:cardIn .8s cubic-bezier(.2,.9,.3,1.2) both;position:relative;}
  @keyframes cardIn{from{opacity:0;transform:translateY(20px) scale(.96);}to{opacity:1;transform:translateY(0) scale(1);}}
  .logo{width:56px;height:56px;margin:0 auto 18px;border-radius:50%;
    background:radial-gradient(circle at 30% 30%,#fff,#7dd3fc 45%,#0ea5e9 70%,#1e3a8a);
    box-shadow:0 0 30px rgba(56,189,248,.7),0 0 60px rgba(168,85,247,.4);
    animation:pulse 2.4s ease-in-out infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 0 25px rgba(56,189,248,.55),0 0 50px rgba(168,85,247,.35);}50%{box-shadow:0 0 45px rgba(56,189,248,.9),0 0 90px rgba(168,85,247,.6);}}
  h1{font-family:'Press Start 2P',monospace;font-size:1rem;text-align:center;margin:0 0 8px;
    color:#fff;letter-spacing:1px;text-shadow:0 0 10px rgba(125,211,252,.8),0 0 20px rgba(168,85,247,.5);
    animation:glow 3s ease-in-out infinite alternate;}
  @keyframes glow{from{text-shadow:0 0 8px rgba(125,211,252,.6),0 0 16px rgba(168,85,247,.35);}to{text-shadow:0 0 14px rgba(125,211,252,1),0 0 28px rgba(168,85,247,.7);}}
  .sub{font-family:'Press Start 2P',monospace;text-align:center;color:var(--muted);font-size:.55rem;margin:0 0 28px;letter-spacing:1px;}
  label{display:block;font-size:.75rem;font-weight:500;margin:0 0 6px;color:var(--ink);
    font-family:'Press Start 2P',monospace;letter-spacing:.5px;}
  .field{margin-bottom:16px;}
  input[type=password],input[type=text]{width:100%;padding:12px 14px;font-size:.95rem;
    border:1px solid var(--border);border-radius:8px;background:rgba(2,6,23,.6);color:var(--ink);
    outline:none;transition:.2s;font-family:'DotGothic16',monospace;caret-color:var(--neon-strong);}
  input:focus{border-color:var(--neon-strong);
    box-shadow:0 0 0 3px rgba(56,189,248,.25),0 0 20px rgba(56,189,248,.35);
    background:rgba(2,6,23,.85);}
  input::placeholder{color:#475569;}
  .row{display:flex;justify-content:space-between;align-items:center;margin:6px 0 22px;font-size:.85rem;}
  .remember{display:flex;align-items:center;gap:6px;color:var(--muted);cursor:pointer;}
  .remember input{accent-color:var(--neon-strong);}
  .forgot{color:var(--neon);text-decoration:none;transition:.2s;cursor:pointer;background:none;border:none;padding:0;font:inherit;font-size:.85rem;}
  .forgot:hover{color:#fff;text-shadow:0 0 8px var(--neon-strong);}
  .btn{width:100%;padding:14px;border:none;border-radius:8px;
    background:linear-gradient(135deg,#0ea5e9,#a78bfa 55%,#f472b6);background-size:200% 200%;
    color:#fff;font-weight:700;font-size:.75rem;letter-spacing:2px;
    font-family:'Press Start 2P',monospace;cursor:pointer;transition:.25s;
    box-shadow:0 8px 24px rgba(14,165,233,.35),0 0 20px rgba(168,85,247,.25);
    animation:btnShift 6s ease infinite;}
  @keyframes btnShift{0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;}}
  .btn:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(14,165,233,.5),0 0 30px rgba(244,114,182,.4);}
  .btn:active{transform:translateY(1px);}
  .btn:disabled{opacity:.6;cursor:wait;}
  .btn.guest{margin-top:12px;background:linear-gradient(135deg,#334155,#475569 55%,#64748b);
    box-shadow:0 8px 24px rgba(51,65,85,.4),0 0 16px rgba(148,163,184,.2);}
  .btn.guest:hover{box-shadow:0 12px 30px rgba(51,65,85,.6),0 0 24px rgba(148,163,184,.35);}
  .err{margin-top:14px;text-align:center;color:#fca5a5;font-size:.85rem;min-height:1.1em;
    text-shadow:0 0 6px rgba(239,68,68,.5);}
  .meta{text-align:center;margin-top:22px;font-size:.55rem;color:var(--muted);
    font-family:'Press Start 2P',monospace;letter-spacing:1px;}
  .meta b{color:var(--neon);}
</style>
</head>
<body>
<div class="space"></div>
<div class="milky"></div>
<div class="nebula"></div>
<div class="stars"></div>
<div class="stars2"></div>
<div class="stars3"></div>
<div class="shoot"></div>
<div class="shoot b"></div>

<div class="wrap">
  <form class="card" method="POST" action="/login" id="loginForm" autocomplete="off">
    <div class="logo"></div>
    <h1>SENNIN TUBE</h1>
    <p class="sub">&gt; SIGN IN TO CONTINUE</p>

    <div class="field">
      <label for="pw">PASSWORD</label>
      <input type="password" id="pw" name="password" placeholder="••••••••" required autofocus>
    </div>

    <div class="row">
      <label class="remember"><input type="checkbox" name="remember" checked> ログイン状態を保持</label>
      <button type="button" class="forgot" id="togglePw">忘れた？</button>
    </div>

    <button type="submit" class="btn" id="submitBtn">LOGIN</button>
    <button type="button" class="btn guest" id="guestBtn">GUEST LOGIN</button>

    <div class="err" id="err">{% if error %}{{ error }}{% endif %}</div>
    <div class="meta">v<b>1.5.0</b> · 仙人TUBE PRO</div>
  </form>
</div>
<script>
  const form=document.getElementById('loginForm');
  const pw=document.getElementById('pw');
  const toggle=document.getElementById('togglePw');
  const submitBtn=document.getElementById('submitBtn');
  const guestBtn=document.getElementById('guestBtn');

  toggle.addEventListener('click',()=>{
    if(pw.type==='password'){pw.type='text';toggle.textContent='隠す';}
    else{pw.type='password';toggle.textContent='忘れた？';}
  });

  form.addEventListener('submit',()=>{
    submitBtn.disabled=true; submitBtn.textContent='AUTHENTICATING...';
    guestBtn.disabled=true;
  });

  guestBtn.addEventListener('click',()=>{
    pw.value='senninpro';
    form.submit();
  });
</script>
</body>
</html>
